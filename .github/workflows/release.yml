name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
    steps:
      - name: Update release pull request
        id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout released commit
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.sha }}
          persist-credentials: false

      - name: Set up pnpm
        if: ${{ steps.release.outputs.release_created }}
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm install --frozen-lockfile

      - name: Check and package release
        if: ${{ steps.release.outputs.release_created }}
        run: pnpm run package

      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" release/* --clobber

      - name: Publish verified release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --draft=false
