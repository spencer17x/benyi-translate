name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate pull request commits
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --check "$BASE_SHA" "$HEAD_SHA"
          pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Validate pushed commits
        if: ${{ github.event_name == 'push' }}
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA" "$HEAD_SHA"
            pnpm exec commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
          else
            git show --check --format= "$HEAD_SHA"
            pnpm exec commitlint --last --verbose
          fi

      - name: Validate merge queue changes
        if: ${{ github.event_name == 'merge_group' }}
        run: git diff --check "${GITHUB_SHA}^" "$GITHUB_SHA"

      - name: Check, build, and package
        run: pnpm run package

      - name: Upload test package
        uses: actions/upload-artifact@v7
        with:
          name: benyi-translate-${{ github.sha }}
          path: release/*
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
